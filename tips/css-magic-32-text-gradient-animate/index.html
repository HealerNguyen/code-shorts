<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Gradient Flow</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #04040f;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.wrapper {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

h1 {
    font-size: 5rem;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.04em;
}

h2 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-top: 8px;
}

.sub {
    color: rgba(255, 255, 255, 0.25);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 12px;
}

/* ── The magic ── */
.gradient-text {
    background: linear-gradient(
        90deg,
        #7c3aed, #a855f7,
        #ec4899, #f97316,
        #7c3aed
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: flow 3s linear infinite;
}

h2.gradient-text {
    animation-duration: 4s;
    animation-direction: reverse;
}

@keyframes flow {
    to { background-position: 200% center; }
}

  </style>
</head>
<body>

<div class="wrapper">
    <h1 class="gradient-text">gradient</h1>
    <h1 class="gradient-text">text flow</h1>
    <h2 class="gradient-text">background-clip: text</h2>
    <p class="sub">zero js · pure css animation</p>
</div>

</body>
</html>
