<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Button</title>
    <style>
      body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #04040f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
}

/* Ambient blobs */
body::before,
body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
}
body::before {
    width: 500px; height: 500px;
    background: rgba(124, 58, 237, 0.18);
    top: -100px; left: -100px;
}
body::after {
    width: 400px; height: 400px;
    background: rgba(236, 72, 153, 0.12);
    bottom: -80px; right: -80px;
}

/* ── Card container ── */
.wrapper {
    position: relative;
    z-index: 1;
}

.card {
    background: #0f0f1a;
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 28px;
    padding: 52px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
}

.label {
    margin: 0;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.02em;
}

.btn-group {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
}

/* ── Base button ── */
.btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 36px;
    border-radius: 50px;
    border: none;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    overflow: hidden;           /* clips the ripple */
    transition: transform 0.15s ease,
                box-shadow 0.3s ease,
                filter 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    letter-spacing: -0.01em;
}

.btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    stroke: currentColor;
}

/* ── Primary variant ── */
.btn-primary {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    box-shadow:
        0 4px 20px rgba(124, 58, 237, 0.45),
        0 1px 0 rgba(255,255,255,0.15) inset;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow:
        0 10px 32px rgba(124, 58, 237, 0.6),
        0 1px 0 rgba(255,255,255,0.15) inset;
    filter: brightness(1.05);
}

.btn-primary:active {
    transform: scale(0.97);
}

/* Press "squish" on click */
.btn-primary.clicked {
    animation: squish 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

/* ── Outline variant ── */
.btn-outline {
    background: transparent;
    color: #a855f7;
    border: 1.5px solid rgba(168, 85, 247, 0.5);
    box-shadow: 0 0 0 0 rgba(168, 85, 247, 0);
}

.btn-outline:hover {
    background: rgba(168, 85, 247, 0.08);
    border-color: rgba(168, 85, 247, 0.9);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.2);
}

.btn-outline:active {
    transform: scale(0.97);
}

.btn-outline.clicked {
    animation: squish 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

/* ── Ripple span ── */
.ripple {
    position: absolute;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    transform: scale(0);
    animation: ripple-expand 0.65s linear forwards;
    pointer-events: none;
}

.btn-primary .ripple {
    background: rgba(255, 255, 255, 0.3);
}

.btn-outline .ripple {
    background: rgba(168, 85, 247, 0.25);
}

/* ── Keyframes ── */
@keyframes ripple-expand {
    to {
        transform: scale(28);
        opacity: 0;
    }
}

@keyframes squish {
    0%   { transform: scale(1); }
    25%  { transform: scale(0.93, 1.06); }
    50%  { transform: scale(1.04, 0.96); }
    75%  { transform: scale(0.98, 1.01); }
    100% { transform: scale(1); }
}

    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <p class="label">Click any button to see the liquid ripple ✦</p>

        <div class="btn-group">
            <button class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
                </svg>
                Get Started
            </button>

            <button class="btn btn-outline">Learn More</button>
        </div>
    </div>
</div>

<script type="text/javascript">
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        // Ripple
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');

        const rect = btn.getBoundingClientRect();
        ripple.style.left = `${e.clientX - rect.left - 10}px`;
        ripple.style.top  = `${e.clientY - rect.top  - 10}px`;

        btn.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());

        // Squish
        btn.classList.add('clicked');
        btn.addEventListener('animationend', () => btn.classList.remove('clicked'), { once: true });
    });
});

</script>
</body>
</html>
