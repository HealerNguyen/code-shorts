<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Tip 26 — Holographic Tilt Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --bg: #08080f;
            --surface: #14141e;
            --edge: rgba(255, 255, 255, 0.12);
            --text: #f0eeff;
            --muted: #9989c8;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 25% 35%, rgba(124, 58, 237, 0.22), transparent 38%),
                radial-gradient(circle at 75% 65%, rgba(16, 185, 129, 0.14), transparent 34%),
                linear-gradient(160deg, #040413 0%, #08080f 50%, #030310 100%);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
            background-size: 38px 38px;
            mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, #000 40%, transparent 100%);
        }

        /* ─── SCENE ─────────────────────────────────── */
        .scene {
            perspective: 900px;
            cursor: none;
        }

        /* ─── CARD ──────────────────────────────────── */
        .card {
            position: relative;
            width: min(92vw, 360px);
            height: min(55vh, 500px);
            border-radius: 28px;
            background:
                linear-gradient(145deg, #1c1535 0%, #0f0f1e 60%, #12082e 100%);
            border: 1px solid var(--edge);
            box-shadow:
                0 4px 4px rgba(0, 0, 0, 0.4),
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform-style: preserve-3d;
            /* updated live by JS */
            transform:
                rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) scale(var(--scale, 1));
            transition: transform 0.08s linear, box-shadow 0.3s ease;
            overflow: hidden;
            isolation: isolate;
        }

        .card.idle {
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.6s ease;
        }

        .card.active {
            --scale: 1.04;
            box-shadow:
                0 6px 6px rgba(0, 0, 0, 0.35),
                0 50px 120px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Holographic rainbow layer */
        .holo-layer {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                linear-gradient(var(--holo-angle, 105deg),
                    rgba(255, 82, 85, 0) 0%,
                    rgba(255, 82, 85, 0.18) 10%,
                    rgba(255, 166, 0, 0.18) 18%,
                    rgba(255, 255, 0, 0.18) 26%,
                    rgba(0, 255, 128, 0.2) 34%,
                    rgba(0, 210, 255, 0.2) 42%,
                    rgba(56, 56, 255, 0.2) 50%,
                    rgba(170, 0, 255, 0.2) 58%,
                    rgba(255, 0, 128, 0.18) 66%,
                    rgba(255, 82, 85, 0) 74%),
                repeating-linear-gradient(0deg,
                    rgba(255, 255, 255, 0.015) 0px,
                    rgba(255, 255, 255, 0.015) 1px,
                    transparent 1px,
                    transparent 4px);
            opacity: var(--holo-opacity, 0);
            mix-blend-mode: screen;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Glare highlight */
        .glare {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at var(--glare-x, 50%) var(--glare-y, 30%),
                    rgba(255, 255, 255, 0.28) 0%,
                    rgba(255, 255, 255, 0.06) 30%,
                    transparent 60%);
            opacity: var(--glare-opacity, 0);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* ─── CARD CONTENT ──────────────────────────── */
        .card-inner {
            position: relative;
            z-index: 2;
            height: 100%;
            padding: 30px 28px 26px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transform: translateZ(28px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .badge {
            padding: 7px 13px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #c4b5fd;
        }

        .chip-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .chip {
            width: 46px;
            height: 34px;
            border-radius: 8px;
            background: linear-gradient(135deg, #c7a84f, #f5d98e, #b8882c);
            box-shadow: 0 3px 16px rgba(199, 168, 79, 0.5);
        }

        .chip-lines {
            width: 36px;
            height: 2px;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 220, 100, 0.7) 35%,
                    rgba(255, 220, 100, 0.7) 65%,
                    rgba(255, 255, 255, 0) 100%);
            border-radius: 2px;
        }

        .card-mid h2 {
            margin: 0 0 8px;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-mid p {
            margin: 0;
            max-width: 22ch;
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.6;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .card-number {
            font-size: 0.88rem;
            letter-spacing: 0.2em;
            color: rgba(240, 238, 255, 0.45);
        }

        .validity {
            font-size: 0.8rem;
            color: rgba(240, 238, 255, 0.45);
            text-align: right;
        }

        .validity small {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(240, 238, 255, 0.3);
            margin-bottom: 3px;
        }

        /* ─── LABEL BELOW ──────────────────────────── */
        .tip-label {
            margin-top: 28px;
            text-align: center;
        }

        .tip-label h3 {
            margin: 0 0 6px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .tip-label p {
            margin: 0;
            font-size: 0.88rem;
            max-width: 36ch;
            color: var(--muted);
            line-height: 1.55;
        }

        .tip-label strong {
            color: #a78bfa;
        }
    </style>
</head>

<body>
    <div>
        <div class="scene" id="scene">
            <div class="card idle" id="card">
                <div class="holo-layer" id="holo"></div>
                <div class="glare" id="glare"></div>
                <div class="card-inner">
                    <div class="card-top">
                        <div class="badge">CSS Tip 26</div>
                        <div class="chip-wrap">
                            <div class="chip"></div>
                            <div class="chip-lines"></div>
                        </div>
                    </div>
                    <div class="card-mid">
                        <h2>Holographic<br>Tilt Card</h2>
                        <p>JS updates CSS variables on mousemove — the rest is pure CSS.</p>
                    </div>
                    <div class="card-footer">
                        <div class="card-number">4242 •••• •••• 8888</div>
                        <div class="validity">
                            <small>Valid Thru</small>
                            03/28
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tip-label">
            <h3>Move your mouse over the card</h3>
            <p>
                Track <strong>mousemove</strong> → normalize to [-1, 1] → set
                <strong>--rx</strong> &amp; <strong>--ry</strong> + holo angle.
                CSS does the rest.
            </p>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const card = document.getElementById('card');
        const holo = document.getElementById('holo');
        const glare = document.getElementById('glare');

        const MAX_ROT = 18;     // degrees
        let raf = null;
        let target = { rx: 0, ry: 0, hx: 50, hy: 50, angle: 105, holoOp: 0, glareOp: 0 };
        let current = { rx: 0, ry: 0, hx: 50, hy: 50, angle: 105, holoOp: 0, glareOp: 0 };

        function lerp(a, b, t) { return a + (b - a) * t; }

        function applyToCard() {
            card.style.setProperty('--rx', current.rx.toFixed(3) + 'deg');
            card.style.setProperty('--ry', current.ry.toFixed(3) + 'deg');
            card.style.setProperty('--holo-angle', current.angle.toFixed(1) + 'deg');
            card.style.setProperty('--holo-opacity', current.holoOp.toFixed(3));
            card.style.setProperty('--glare-x', current.hx.toFixed(2) + '%');
            card.style.setProperty('--glare-y', current.hy.toFixed(2) + '%');
            card.style.setProperty('--glare-opacity', current.glareOp.toFixed(3));
        }

        function tick() {
            const t = 0.12;
            let dirty = false;

            for (const k of ['rx', 'ry', 'hx', 'hy', 'angle', 'holoOp', 'glareOp']) {
                const next = lerp(current[k], target[k], t);
                if (Math.abs(next - current[k]) > 0.001) { current[k] = next; dirty = true; }
            }

            if (dirty) { applyToCard(); raf = requestAnimationFrame(tick); }
            else { raf = null; }
        }

        function startTick() {
            if (!raf) raf = requestAnimationFrame(tick);
        }

        scene.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = (e.clientX - cx) / (rect.width / 2); // –1 → 1
            const dy = (e.clientY - cy) / (rect.height / 2);

            // Glare position (as % within bounding rect)
            const gx = ((e.clientX - rect.left) / rect.width) * 100;
            const gy = ((e.clientY - rect.top) / rect.height) * 100;

            card.classList.remove('idle');
            card.classList.add('active');

            target.rx = -dy * MAX_ROT;
            target.ry = dx * MAX_ROT;
            target.hx = gx;
            target.hy = gy;
            target.angle = 105 + dx * 40 + dy * 20;
            target.holoOp = 0.82;
            target.glareOp = 0.7;

            startTick();
        });

        function resetCard() {
            card.classList.add('idle');
            card.classList.remove('active');
            target.rx = target.ry = 0;
            target.hx = 50; target.hy = 50;
            target.angle = 105;
            target.holoOp = 0;
            target.glareOp = 0;
            startTick();
        }

        scene.addEventListener('mouseleave', resetCard);
        document.addEventListener('blur', resetCard);
    </script>
</body>

</html>
