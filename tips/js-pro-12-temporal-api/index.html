<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal API</title>
    <!-- Temporal polyfill for broad browser support -->
    <script src="https://cdn.jsdelivr.net/npm/@js-temporal/polyfill@0.4.4/dist/index.umd.js"></script>
    <script>if (!globalThis.Temporal) globalThis.Temporal = globalThis.JSTemporalPolyfill?.Temporal || globalThis.TemporalPolyfill?.Temporal;</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="panel">
    <div class="panel-title">Temporal API — Modern Dates</div>

    <div class="date-display">
        <div class="date-label">Today</div>
        <div class="date-value" id="todayVal">—</div>
    </div>

    <div class="date-display" style="border-color: rgba(34,197,94,0.3);">
        <div class="date-label">Deadline</div>
        <div class="date-value" style="color: #34d399;" id="deadlineVal">—</div>
    </div>

    <div class="ops-list">
        <div class="op-row active" id="opUntil">
            <span class="op-name">.until()</span>
            <span class="op-input">today → deadline</span>
            <span class="op-arrow">→</span>
            <span class="op-result" id="opUntilResult">—</span>
        </div>
        <div class="op-row" id="opAdd">
            <span class="op-name">.add()</span>
            <span class="op-input">{ weeks: 1 }</span>
            <span class="op-arrow">→</span>
            <span class="op-result" id="opAddResult">—</span>
        </div>
        <div class="op-row" id="opSubtract">
            <span class="op-name">.subtract()</span>
            <span class="op-input">{ months: 1 }</span>
            <span class="op-arrow">→</span>
            <span class="op-result" id="opSubtractResult">—</span>
        </div>
        <div class="op-row" id="opCompare">
            <span class="op-name">.compare()</span>
            <span class="op-input">today &lt; deadline</span>
            <span class="op-arrow">→</span>
            <span class="op-result" id="opCompareResult">—</span>
        </div>
    </div>

    <div class="duration-bar">
        <div class="bar-label">Year progress</div>
        <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
        <div class="bar-days" id="barDays">—</div>
    </div>

    <div class="hint" id="hint">
        <span class="kw">const</span> today = <span class="fn">Temporal.Now</span>.<span class="fn">plainDateISO</span>()
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
