<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Animated Download Button</title>
  <style>
body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
}

/* Grid background for premium feel */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: -1;
}

.btn {
  position: relative;
  width: 200px;
  height: 60px;
  border-radius: 30px;
  background: #1e293b;
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-family: inherit;
  font-size: 1.1rem;
  font-weight: 500;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  outline: none;
}

.btn:hover {
  background: #334155;
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

.content {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.4s ease;
  opacity: 0;
  transform: translateY(20px);
}

.content svg {
    width: 24px;
    height: 24px;
}

.btn[data-state="default"] .default,
.btn[data-state="loading"] .loading,
.btn[data-state="success"] .success {
  opacity: 1;
  transform: translateY(0);
}

.btn[data-state="loading"] {
  width: 60px;
  background: #3b82f6;
  border-color: #60a5fa;
  box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
  transform: translateY(0);
  pointer-events: none;
}

.btn[data-state="success"] {
  width: 160px;
  background: #10b981;
  border-color: #34d399;
  box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
  transform: translateY(0);
  pointer-events: none;
}

.spinner {
  width: 24px;
  height: 24px;
  animation: rotate 1s linear infinite;
}

.spinner circle {
  fill: none;
  stroke: rgba(255,255,255,0.8);
  stroke-width: 4;
  stroke-dasharray: 90, 150;
  stroke-dashoffset: 0;
  animation: dash 1.5s ease-in-out infinite;
}

@keyframes rotate { 100% { transform: rotate(360deg); } }
@keyframes dash {
  0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
  50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
  100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
}

    </style>
</head>
<body>

<div class="wrapper">
  <button class="btn" id="dl-btn" data-state="default">
    <div class="content default">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      <span>Download</span>
    </div>
    <div class="content loading">
      <svg class="spinner" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20"></circle>
      </svg>
    </div>
    <div class="content success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <span>Done</span>
    </div>
  </button>
</div>

<script type="text/javascript">
  const btn = document.getElementById('dl-btn');

  btn.addEventListener('click', () => {
      // Set to loading state
      btn.setAttribute('data-state', 'loading');
      
      // Simulate a network request or download
      setTimeout(() => {
          // Set to success state
          btn.setAttribute('data-state', 'success');
          
          // Reset back to default after 3 seconds
          setTimeout(() => {
              btn.setAttribute('data-state', 'default');
          }, 3000);
          
      }, 2500); // 2.5 seconds loading simulation
  });

</script>
</body>
</html>
