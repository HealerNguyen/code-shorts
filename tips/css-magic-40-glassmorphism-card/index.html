<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="glass-card">
        <div class="card-header">
            <div class="avatar">❄️</div>
            <div class="header-text">
                <h3>Glassmorphism</h3>
                <span class="badge">CSS Only</span>
            </div>
        </div>
        <p class="card-body">Frosted glass effect using <code>backdrop-filter: blur()</code> with semi-transparent backgrounds and subtle borders.</p>
        <div class="card-stats">
            <div class="stat">
                <span class="stat-value">16px</span>
                <span class="stat-label">Blur</span>
            </div>
            <div class="stat">
                <span class="stat-value">5%</span>
                <span class="stat-label">Opacity</span>
            </div>
            <div class="stat">
                <span class="stat-value">20px</span>
                <span class="stat-label">Radius</span>
            </div>
        </div>
        <div class="card-footer">
            <button class="glass-btn">Explore</button>
            <button class="glass-btn outline">Learn More</button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
