<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton Loading</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #04040f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(2, 340px);
    gap: 20px;
}

.card {
    background: #0d0d1a;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 20px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.sk-header {
    display: flex;
    align-items: center;
    gap: 12px;
}

.sk-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    flex-shrink: 0;
}

.sk-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.sk-name {
    height: 11px;
    border-radius: 6px;
    width: 55%;
}

.sk-sub {
    height: 9px;
    border-radius: 6px;
    width: 38%;
}

.sk-img {
    width: 100%;
    height: 170px;
    border-radius: 12px;
}

.lines {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.sk-line {
    height: 10px;
    border-radius: 6px;
}

.sk-line.full { width: 100%; }
.sk-line.med  { width: 72%; }
.sk-line.sml  { width: 48%; }

/* ── Shimmer ── */
.skeleton {
    background: linear-gradient(
        90deg,
        #1a1a2e 25%,
        #2a2a4a 50%,
        #1a1a2e 75%
    );
    background-size: 200% 100%;
    animation: shimmer 1.8s infinite;
}

@keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
}

    </style>
</head>
<body>

<div class="cards">
    <div class="card">
        <div class="sk-header">
            <div class="skeleton sk-avatar"></div>
            <div class="sk-info">
                <div class="skeleton sk-name"></div>
                <div class="skeleton sk-sub"></div>
            </div>
        </div>
        <div class="skeleton sk-img"></div>
        <div class="lines">
            <div class="skeleton sk-line full"></div>
            <div class="skeleton sk-line med"></div>
            <div class="skeleton sk-line sml"></div>
        </div>
    </div>

    <div class="card">
        <div class="sk-header">
            <div class="skeleton sk-avatar"></div>
            <div class="sk-info">
                <div class="skeleton sk-name"></div>
                <div class="skeleton sk-sub"></div>
            </div>
        </div>
        <div class="skeleton sk-img"></div>
        <div class="lines">
            <div class="skeleton sk-line full"></div>
            <div class="skeleton sk-line med"></div>
            <div class="skeleton sk-line sml"></div>
        </div>
    </div>
</div>

</body>
</html>
